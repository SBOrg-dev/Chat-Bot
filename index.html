<script>

async function send(){

let text=document.getElementById("msg").value

document.getElementById("risposta").innerText="Sto pensando..."

try{

const response=await fetch("https://api.together.xyz/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer tgp_v1_ZgFnPGnlQ6DUee7GkGc01yD9lO7ttXS7T114eRgyeK0",
"Content-Type":"application/json"
},

body:JSON.stringify({

model:"meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo",

messages:[
{role:"user",content:text}
]

})

})

const data=await response.json()

if(data.error){
document.getElementById("risposta").innerText=data.error.message
return
}

document.getElementById("risposta").innerText=
data.choices[0].message.content

}catch(err){

document.getElementById("risposta").innerText="Errore: "+err

}

}

</script>
