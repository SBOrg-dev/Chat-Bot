<!DOCTYPE html>
<html>
<head>
<title>Tutor AI</title>
</head>

<body>

<h1>Tutor AI</h1>

<input id="msg" type="text" placeholder="Scrivi qui">
<button onclick="send()">Invia</button>

<p id="risposta"></p>

<script>

async function send() {

  const inputField = document.getElementById("msg");
  const rispostaDiv = document.getElementById("risposta");

  const text = inputField.value.trim();

  if (!text) return;

  rispostaDiv.innerText = "Sto pensando...";
  inputField.value = "";

  try {

    const response = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: text
      })
    });

    if (!response.ok) {
      throw new Error("Errore server");
    }

    const data = await response.json();

   console.log(data);

if (data.choices && data.choices.length > 0) {
  rispostaDiv.innerText = data.choices[0].message.content;
} else if (data.error) {
  rispostaDiv.innerText = "Errore API: " + data.error;
} else {
  rispostaDiv.innerText = JSON.stringify(data);
}
}

</script>

</body>
</html>
