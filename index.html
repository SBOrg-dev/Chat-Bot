<!DOCTYPE html>
<html>

<head>
<title>Tutor AI</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:60px;
background:#f4f6f8;
}

#chatbox{
width:400px;
margin:auto;
}

input{
width:100%;
padding:12px;
font-size:16px;
}

button{
margin-top:10px;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#risposta{
margin-top:20px;
background:white;
padding:15px;
border-radius:8px;
}

</style>

</head>

<body>

<h2>Tutor AI</h2>

<div id="chatbox">

<input id="msg" placeholder="Scrivi la tua domanda...">

<button onclick="send()">Invia</button>

<div id="risposta">
Ciao! Sono Tutor AI. Scrivi una domanda.
</div>

</div>

<script>

function send(){

let text=document.getElementById("msg").value

document.getElementById("risposta").innerText=
"Hai scritto: " + text +
"\n\nTutor AI sarà collegato presto all'intelligenza artificiale."

}

</script>

</body>

</html>

}

</script>
